<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Orange tabby gradient -->
    <linearGradient id="orangeGrad" x1="0" y1="0" x2="0" y2="512" gradientUnits="userSpaceOnUse">
      <stop stopColor="#FFB366"/>
      <stop offset="1" stopColor="#FF8533"/>
    </linearGradient>

    <!-- White fur gradient -->
    <linearGradient id="whiteGrad" x1="0" y1="0" x2="0" y2="512" gradientUnits="userSpaceOnUse">
      <stop stopColor="#FFFFFF"/>
      <stop offset="1" stopColor="#F5F0F0"/>
    </linearGradient>

    <!-- Pink for ears and nose -->
    <linearGradient id="pinkGrad" x1="0" y1="0" x2="0" y2="512" gradientUnits="userSpaceOnUse">
      <stop stopColor="#FFB5C5"/>
      <stop offset="1" stopColor="#FF8FAB"/>
    </linearGradient>

    <!-- Golden coin gradient -->
    <linearGradient id="coinGrad" x1="0" y1="0" x2="0" y2="512" gradientUnits="userSpaceOnUse">
      <stop stopColor="#FFD700"/>
      <stop offset="1" stopColor="#FFA500"/>
    </linearGradient>

    <!-- Orange stripes pattern -->
    <pattern id="stripePattern" patternUnits="userSpaceOnUse" width="30" height="30" patternTransform="rotate(45)">
      <rect width="15" height="30" fill="#FF8533"/>
      <rect x="15" width="15" height="30" fill="#FFB366"/>
    </pattern>
  </defs>

  <!-- White background -->
  <rect width="512" height="512" rx="110" fill="white"/>

  <!-- Cat ears - orange with pink inner -->
  <path d="M120 180 L160 80 L200 160 Z" fill="url(#orangeGrad)"/>
  <path d="M392 180 L352 80 L312 160 Z" fill="url(#orangeGrad)"/>
  <path d="M145 165 L160 105 L175 155 Z" fill="url(#pinkGrad)"/>
  <path d="M367 165 L352 105 L337 155 Z" fill="url(#pinkGrad)"/>

  <!-- Cat face - main white area with orange patches -->
  <circle cx="256" cy="280" r="175" fill="url(#whiteGrad)"/>

  <!-- Orange patches on face -->
  <ellipse cx="170" cy="200" rx="60" ry="50" fill="url(#orangeGrad)"/>
  <ellipse cx="342" cy="200" rx="60" ry="50" fill="url(#orangeGrad)"/>
  <ellipse cx="256" cy="380" rx="80" ry="40" fill="url(#orangeGrad)"/>

  <!-- Orange forehead stripe -->
  <path d="M256 120 L230 180 L256 200 L282 180 Z" fill="url(#orangeGrad)"/>

  <!-- Eyes - bright green (no black!) -->
  <ellipse cx="190" cy="260" rx="38" ry="42" fill="#7CB342"/>
  <ellipse cx="322" cy="260" rx="38" ry="42" fill="#7CB342"/>

  <!-- Eye inner -->
  <ellipse cx="190" cy="260" rx="20" ry="28" fill="#558B2F"/>
  <ellipse cx="322" cy="260" rx="20" ry="28" fill="#558B2F"/>

  <!-- Eye highlights -->
  <circle cx="178" cy="248" r="10" fill="white"/>
  <circle cx="310" cy="248" r="10" fill="white"/>
  <circle cx="198" cy="270" r="5" fill="white"/>
  <circle cx="330" cy="270" r="5" fill="white"/>

  <!-- Nose - pink -->
  <path d="M256 310 L245 325 L267 325 Z" fill="url(#pinkGrad)"/>

  <!-- Mouth - dark orange instead of black -->
  <path d="M256 325 L256 340" stroke="#CC6600" stroke-width="3" stroke-linecap="round"/>
  <path d="M230 350 Q256 365 282 350" stroke="#CC6600" stroke-width="3" stroke-linecap="round" fill="none"/>

  <!-- Whiskers - light orange/tan -->
  <line x1="130" y1="300" x2="190" y2="310" stroke="#D4A574" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="130" y1="320" x2="190" y2="320" stroke="#D4A574" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="130" y1="340" x2="190" y2="330" stroke="#D4A574" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="382" y1="300" x2="322" y2="310" stroke="#D4A574" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="382" y1="320" x2="322" y2="320" stroke="#D4A574" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="382" y1="340" x2="322" y2="330" stroke="#D4A574" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Blush -->
  <ellipse cx="160" cy="330" rx="28" ry="18" fill="#FFB5C5" fill-opacity="0.5"/>
  <ellipse cx="352" cy="330" rx="28" ry="18" fill="#FFB5C5" fill-opacity="0.5"/>

  <!-- Gold coin -->
  <circle cx="420" cy="420" r="70" fill="url(#coinGrad)" stroke="#DAA520" stroke-width="4"/>
  <text x="420" y="440" font-family="Arial, sans-serif" font-size="70" font-weight="bold" fill="#8B6914" text-anchor="middle">L</text>

  <!-- Paws - white with orange -->
  <ellipse cx="180" cy="450" rx="40" ry="25" fill="url(#whiteGrad)"/>
  <ellipse cx="332" cy="450" rx="40" ry="25" fill="url(#whiteGrad)"/>
  <ellipse cx="180" cy="450" rx="25" ry="15" fill="url(#orangeGrad)"/>
  <ellipse cx="332" cy="450" rx="25" ry="15" fill="url(#orangeGrad)"/>

  <!-- Tail - orange and white stripes -->
  <path d="M90 380 Q50 300 100 260 Q130 230 160 250" stroke="url(#orangeGrad)" stroke-width="25" stroke-linecap="round" fill="none"/>
  <path d="M85 360 Q55 310 95 275" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" fill="none" stroke-opacity="0.4"/>
</svg>
